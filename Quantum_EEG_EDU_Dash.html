body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  overflow-x: hidden;
}

.progress-ribbon {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.2);
  z-index: 1000;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00ff88, #00ccff);
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 20px rgba(0,255,136,0.6);
}

.header {
  text-align: center;
  padding: 40px 20px 20px;
  color: white;
}

.header h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.header p {
  font-size: 1.1em;
  opacity: 0.9;
}

.phase-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

.phase-card {
  background: white;
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.phase-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 50px rgba(0,0,0,0.3);
}

.phase-card.completed {
  border: 3px solid #00ff88;
  background: linear-gradient(135deg, #f0fff4 0%, #e6fffa 100%);
}

.phase-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.phase-title {
  display: flex;
  align-items: center;
  gap: 15px;
}

.phase-icon {
  font-size: 2.5em;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.phase-title h2 {
  color: #2d3748;
  font-size: 1.8em;
}

.badge {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2em;
  background: linear-gradient(135deg, #ffd700, #ffed4e);
  box-shadow: 0 4px 15px rgba(255,215,0,0.4);
  animation: spin 2s ease-in-out;
}

@keyframes spin {
  0% { transform: rotate(0deg) scale(0); }
  50% { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(360deg) scale(1); }
}

.badge.hidden {
  opacity: 0.3;
  background: #e2e8f0;
}

.journal-section {
  background: #f7fafc;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
}

.journal-input {
  width: 100%;
  min-height: 100px;
  padding: 15px;
  border: 2px solid #cbd5e0;
  border-radius: 8px;
  font-size: 1em;
  font-family: inherit;
  resize: vertical;
  transition: border-color 0.3s ease;
}

.journal-input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
}

.avatar-container {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
}

.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 1.2em;
  cursor: pointer;
  transition: transform 0.3s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.avatar.active {
  animation: wave 0.6s ease-in-out;
}

@keyframes wave {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-15deg); }
  75% { transform: rotate(15deg); }
}

.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 15px;
}

.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  box-shadow: 0 4px 15px rgba(102,126,234,0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102,126,234,0.6);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.cinematic-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.cinematic-overlay.active {
  display: flex;
  animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.cinematic-content {
  text-align: center;
  color: white;
}

.badge-ring {
  display: flex;
  gap: 30px;
  margin: 40px 0;
  animation: orbit 3s ease-in-out infinite;
}

@keyframes orbit {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.badge-ring .badge {
  width: 80px;
  height: 80px;
  font-size: 2.5em;
}

.hall-of-fame {
  margin-top: 40px;
  padding: 30px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: #ffd700;
  animation: confetti-fall 3s linear infinite;
}

@keyframes confetti-fall {
  0% { transform: translateY(-100vh) rotate(0deg); }
  100% { transform: translateY(100vh) rotate(720deg); }
}

.shared-reflection {
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border-radius: 16px;
  padding: 30px;
  margin: 30px 0;
  border-left: 5px solid #f59e0b;
}

.collaborative-note {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin: 10px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  position: relative;
}

.note-avatar {
  position: absolute;
  top: -10px;
  left: 15px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8em;
  font-weight: bold;
}

.floating-export {
  position: fixed;
  bottom: 30px;
  right: 30px;
  display: flex;
  gap: 15px;
  z-index: 100;
}

.fab {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  font-size: 1.5em;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(102,126,234,0.4);
  transition: transform 0.3s ease;
}

.fab:hover {
  transform: scale(1.1);
}

<body>
  <div class="progress-ribbon">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="header">
    <h1>🌟 QuantumEEGNet EDU Edition</h1>
    <p>Your Global Learning Journey Begins Here</p>
  </div>

  <div class="phase-container" id="phaseContainer">
    <!-- Phases will be dynamically generated -->
  </div>

  <div class="shared-reflection">
    <h2 style="color: #92400e; margin-bottom: 20px;">🤝 Shared Class Reflection</h2>
    <p style="color: #78350f; margin-bottom: 15px;">This is our collective learning space. Everyone's voice matters here.</p>
    <textarea 
      class="journal-input" 
      id="sharedReflection" 
      placeholder="Share your thoughts with the class..."></textarea>
    <button class="btn btn-primary" onclick="addSharedNote()">Add to Shared Reflection</button>
    <div id="sharedNotes" style="margin-top: 20px;"></div>
  </div>

  <div class="floating-export">
    <button class="fab" onclick="exportPDF()" title="Export as PDF">📄</button>
    <button class="fab" onclick="shareToLMS()" title="Share to LMS">📤</button>
    <button class="fab" onclick="generateCertificate()" title="Generate Certificate">🏆</button>
  </div>

  <div class="cinematic-overlay" id="cinematicOverlay">
    <div class="cinematic-content">
      <h1 style="font-size: 3em; margin-bottom: 20px;">🎉 Congratulations! 🎉</h1>
      <p style="font-size: 1.5em; margin-bottom: 30px;">Your Global Learning Journey is Complete!</p>
      <div class="badge-ring" id="badgeRing"></div>
      <div class="hall-of-fame">
        <h2 style="font-size: 2em; margin-bottom: 20px;">🏆 Hall of Fame 🏆</h2>
        <div id="hallOfFameAvatars" style="display: flex; justify-content: center; gap: 20px;"></div>
      </div>
    </div>
  </div>

  <script>
    const phases = [
      {
        id: 1,
        title: "Begin Your Learning Adventure",
        icon: "🌱",
        badge: "🌱",
        prompts: [
          "What excites you most about this learning journey?",
          "What do you hope to discover about yourself?",
          "How do you learn best?"
        ],
        teacherTips: "Encourage students to think about their personal learning style and goals."
      },
      {
        id: 2,
        title: "Local Growth & Discovery",
        icon: "🌟",
        badge: "🌟",
        prompts: [
          "What have you learned about your community?",
          "How has your understanding grown?",
          "What local resources have helped you learn?"
        ],
        teacherTips: "Help students connect learning to their immediate environment."
      },
      {
        id: 3,
        title: "Regional Achievements",
        icon: "🤝",
        badge: "🤝",
        prompts: [
          "How has working with others enhanced your learning?",
          "What regional connections have you made?",
          "How has collaboration changed your perspective?"
        ],
        teacherTips: "Facilitate teamwork and celebrate collaborative success."
      },
      {
        id: 4,
        title: "Global Learning Celebration",
        icon: "🌎",
        badge: "🌎",
        prompts: [
          "What cultural insights have you gained?",
          "How do different perspectives enrich learning?",
          "What global connections inspire you?"
        ],
        teacherTips: "Encourage appreciation of diverse viewpoints and global awareness."
      },
      {
        id: 5,
        title: "Recognition & Reflection",
        icon: "🏆",
        badge: "🏆",
        prompts: [
          "What are you most proud of accomplishing?",
          "How have you grown throughout this journey?",
          "What will you carry forward from this experience?"
        ],
        teacherTips: "Guide students in meaningful self-reflection and celebration."
      }
    ];

    let studentName = localStorage.getItem('studentName') || 'Student';
    let completedPhases = JSON.parse(localStorage.getItem('completedPhases') || '[]');
    let journalEntries = JSON.parse(localStorage.getItem('journalEntries') || '{}');
    let sharedNotes = JSON.parse(localStorage.getItem('sharedNotes') || '[]');

    function initializeApp() {
      if (!localStorage.getItem('studentName')) {
        studentName = prompt("Welcome! What's your name?") || 'Student';
        localStorage.setItem('studentName', studentName);
      }
      renderPhases();
      renderSharedNotes();
      updateProgress();
    }

    function renderPhases() {
      const container = document.getElementById('phaseContainer');
      container.innerHTML = '';

      phases.forEach((phase, index) => {
        const isCompleted = completedPhases.includes(phase.id);
        const card = document.createElement('div');
        card.className = `phase-card ${isCompleted ? 'completed' : ''}`;
        card.innerHTML = `
          <div class="avatar-container">
            <div class="avatar" onclick="animateAvatar(this)">
              ${studentName.charAt(0).toUpperCase()}
            </div>
          </div>
          <div class="phase-header">
            <div class="phase-title">
              <div class="phase-icon">${phase.icon}</div>
              <div>
                <h2>${phase.title}</h2>
                <p style="color: #718096; margin-top: 5px;">Phase ${phase.id} of 5</p>
              </div>
            </div>
            <div class="badge ${isCompleted ? '' : 'hidden'}">${phase.badge}</div>
          </div>
          <div class="journal-section">
            <h3 style="color: #2d3748; margin-bottom: 15px;">Student Prompts</h3>
            ${phase.prompts.map((prompt, i) => `
              <p style="color: #4a5568; margin: 10px 0;">• ${prompt}</p>
            `).join('')}
            <textarea 
              class="journal-input" 
              id="journal-${phase.id}"
              placeholder="Write your reflection..."
              onchange="saveJournal(${phase.id})">${journalEntries[phase.id] || ''}</textarea>

```
        <button 
          class="btn btn-primary" 
          onclick="completePhase(${phase.id})"
          ${isCompleted ? 'disabled' : ''}>
          ${isCompleted ? '✓ Completed' : 'Complete Phase'}
        </button>
      </div>
      <div style="background: #edf2f7; padding: 15px; border-radius: 8px; margin-top: 20px;">
        <h4 style="color: #2d3748; margin-bottom: 10px;">💡 Teacher Tips</h4>
        <p style="color: #4a5568;">${phase.teacherTips}</p>
      </div>
    `;
    container.appendChild(card);
  });
}

function animateAvatar(element) {
  element.classList.add('active');
  setTimeout(() => element.classList.remove('active'), 600);
}

function saveJournal(phaseId) {
  const input = document.getElementById(`journal-${phaseId}`);
  journalEntries[phaseId] = input.value;
  localStorage.setItem('journalEntries', JSON.stringify(journalEntries));
  
  // Animate avatar on save
  const avatars = document.querySelectorAll('.avatar');
  avatars.forEach(avatar => {
    avatar.style.animation = 'none';
    setTimeout(() => avatar.style.animation = '', 10);
  });
}

function completePhase(phaseId) {
  const journal = journalEntries[phaseId];
  if (!journal || journal.trim().length < 20) {
    alert('Please write a meaningful reflection (at least 20 characters) before completing this phase.');
    return;
  }

  if (!completedPhases.includes(phaseId)) {
    completedPhases.push(phaseId);
    localStorage.setItem('completedPhases', JSON.stringify(completedPhases));
    
    // Play completion sound (visual feedback)
    playCompletionAnimation(phaseId);
    
    renderPhases();
    updateProgress();
    
    // Check if all phases complete
    if (completedPhases.length === phases.length && sharedNotes.length > 0) {
      setTimeout(triggerCinematic, 1000);
    }
  }
}

function playCompletionAnimation(phaseId) {
  // Create confetti
  for (let i = 0; i < 50; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = ['#ffd700', '#00ff88', '#00ccff', '#ff6b9d'][Math.floor(Math.random() * 4)];
    confetti.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 3000);
  }
}

function updateProgress() {
  const progress = (completedPhases.length / phases.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
}

function addSharedNote() {
  const input = document.getElementById('sharedReflection');
  const text = input.value.trim();
  
  if (text.length < 10) {
    alert('Please write at least 10 characters for your shared reflection.');
    return;
  }

  const note = {
    author: studentName,
    text: text,
    timestamp: new Date().toLocaleString()
  };

  sharedNotes.push(note);
  localStorage.setItem('sharedNotes', JSON.stringify(sharedNotes));
  input.value = '';
  renderSharedNotes();

  // Check completion
  if (completedPhases.length === phases.length && sharedNotes.length > 0) {
    setTimeout(triggerCinematic, 1000);
  }
}

function renderSharedNotes() {
  const container = document.getElementById('sharedNotes');
  container.innerHTML = sharedNotes.map(note => `
    <div class="collaborative-note">
      <div class="note-avatar">${note.author.charAt(0).toUpperCase()}</div>
      <div style="margin-top: 10px;">
        <p style="color: #2d3748; margin-bottom: 8px;">${note.text}</p>
        <p style="color: #a0aec0; font-size: 0.85em;">— ${note.author}, ${note.timestamp}</p>
      </div>
    </div>
  `).join('');
}

function triggerCinematic() {
  const overlay = document.getElementById('cinematicOverlay');
  overlay.classList.add('active');

  // Render badges
  const badgeRing = document.getElementById('badgeRing');
  badgeRing.innerHTML = phases.map(p => `
    <div class="badge">${p.badge}</div>
  `).join('');

  // Render hall of fame
  const hallOfFame = document.getElementById('hallOfFameAvatars');
  const uniqueStudents = [...new Set([studentName, ...sharedNotes.map(n => n.author)])];
  hallOfFame.innerHTML = uniqueStudents.map(name => `
    <div class="avatar" style="width: 80px; height: 80px; font-size: 2em;">
      ${name.charAt(0).toUpperCase()}
    </div>
  `).join('');

  // Confetti explosion
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = ['#ffd700', '#00ff88', '#00ccff', '#ff6b9d'][Math.floor(Math.random() * 4)];
    confetti.style.animationDelay = Math.random() * 3 + 's';
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 3000);
  }

  // Play audio message
  setTimeout(() => {
    alert('🎵 Congratulations! Your global learning journey is complete! 🎵');
  }, 2000);
}

function exportPDF() {
  alert('📄 PDF export functionality would integrate with jsPDF library in production.\n\nYour journey summary is being prepared...');
}

function shareToLMS() {
  alert('📤 LMS integration would connect to Canvas, Moodle, or Google Classroom.\n\nYour progress is ready to share!');
}

function generateCertificate() {
  if (completedPhases.length === phases.length) {
    alert('🏆 Blockchain Certificate Generated!\n\nCertificate ID: QEG-' + Date.now() + '\nStudent: ' + studentName + '\nCompleted: ' + new Date().toLocaleDateString());
  } else {
    alert('Complete all phases first to earn your certificate!');
  }
}

// Initialize app
initializeApp();
